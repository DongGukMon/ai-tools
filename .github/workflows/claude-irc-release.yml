name: "claude-irc: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate release version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="$RAW_VERSION"
          semver_tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          case "$version" in
            *$'\n'*|*$'\r'*)
              echo "Invalid release version: must be a single-line semver tag" >&2
              exit 1
              ;;
          esac
          if ! printf '%s' "$version" | grep -Eq "$semver_tag_pattern"; then
            echo "Invalid release version: must match semver tag format" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: claude-irc/go.mod
          cache-dependency-path: claude-irc/go.sum

      - name: Build binaries
        run: |
          cd claude-irc
          VERSION="$RELEASE_VERSION"
          make cross VERSION="$VERSION"

      - name: Generate checksums
        run: |
          cd claude-irc/dist
          sha256sum claude-irc-* > claude-irc-checksums.txt

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_VERSION" claude-irc/dist/*
