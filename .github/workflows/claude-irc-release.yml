name: "claude-irc: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: claude-irc/go.sum

      - name: Build binaries
        run: |
          cd claude-irc
          VERSION=${{ inputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/claude-irc-darwin-arm64 ./cmd/claude-irc
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/claude-irc-darwin-amd64 ./cmd/claude-irc
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/claude-irc-linux-amd64 ./cmd/claude-irc

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.version }}" \
            claude-irc/dist/claude-irc-darwin-arm64 \
            claude-irc/dist/claude-irc-darwin-amd64 \
            claude-irc/dist/claude-irc-linux-amd64
