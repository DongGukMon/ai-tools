name: "rewind: Test"

on:
  push:
    branches: [main]
    paths:
      - 'rewind/**'
      - 'shared/upgrade/**'
  pull_request:
    branches: [main]
    paths:
      - 'rewind/**'
      - 'shared/upgrade/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: rewind/go.mod
          cache-dependency-path: |
            rewind/go.sum
            rewind/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build frontend
        run: |
          cd rewind/web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run tests
        run: |
          cd rewind
          go test ./...
