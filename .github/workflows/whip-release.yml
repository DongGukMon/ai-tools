name: "whip: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: whip/go.sum

      - name: Build binaries
        run: |
          cd whip
          VERSION=${{ inputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/whip-darwin-arm64 ./cmd/whip
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/whip-darwin-amd64 ./cmd/whip
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/whip-linux-amd64 ./cmd/whip

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.version }}" \
            whip/dist/whip-darwin-arm64 \
            whip/dist/whip-darwin-amd64 \
            whip/dist/whip-linux-amd64
