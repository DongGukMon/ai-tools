name: "whip: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="$RAW_VERSION"
          semver_tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if ! printf '%s\n' "$version" | grep -Eq "$semver_tag_pattern"; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: whip/go.sum

      - name: Build binaries
        run: |
          cd whip
          VERSION="$RELEASE_VERSION"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/whip-darwin-arm64 ./cmd/whip
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/whip-darwin-amd64 ./cmd/whip
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/whip-linux-amd64 ./cmd/whip

      - name: Generate checksums
        run: |
          cd whip/dist
          sha256sum * > whip-checksums.txt

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_VERSION" \
            whip/dist/whip-darwin-arm64 \
            whip/dist/whip-darwin-amd64 \
            whip/dist/whip-linux-amd64 \
            whip/dist/whip-checksums.txt
