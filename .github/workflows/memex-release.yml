name: "memex: Release"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install and build
        run: |
          cd memex
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Package dist
        run: |
          cd memex
          tar czf memex-dist.tar.gz dist/ package.json pnpm-lock.yaml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: memex/memex-dist.tar.gz
          generate_release_notes: true
