name: "shared/agentbus: Test"

on:
  push:
    branches: [main]
    paths:
      - 'shared/agentbus/**'
  pull_request:
    branches: [main]
    paths:
      - 'shared/agentbus/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: shared/agentbus/go.mod
          cache-dependency-path: shared/agentbus/go.mod

      - name: Run tests
        run: |
          cd shared/agentbus
          go test ./...
