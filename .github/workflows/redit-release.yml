name: "redit: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate release version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="$RAW_VERSION"
          semver_tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          case "$version" in
            *$'\n'*|*$'\r'*)
              echo "Invalid release version: must be a single-line semver tag" >&2
              exit 1
              ;;
          esac
          if ! printf '%s' "$version" | grep -Eq "$semver_tag_pattern"; then
            echo "Invalid release version: must match semver tag format" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: redit/go.mod
          cache-dependency-path: redit/go.sum

      - name: Build binaries
        run: |
          cd redit
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${RELEASE_VERSION}"
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/redit-darwin-arm64 ./cmd/redit
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/redit-darwin-amd64 ./cmd/redit
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/redit-linux-amd64 ./cmd/redit
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/redit-windows-amd64.exe ./cmd/redit

      - name: Generate checksums
        run: |
          cd redit/dist
          sha256sum * > redit-checksums.txt

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_VERSION" \
            redit/dist/redit-darwin-arm64 \
            redit/dist/redit-darwin-amd64 \
            redit/dist/redit-linux-amd64 \
            redit/dist/redit-windows-amd64.exe \
            redit/dist/redit-checksums.txt
