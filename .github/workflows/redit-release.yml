name: "redit: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: redit/go.sum

      - name: Build binaries
        run: |
          cd redit
          mkdir -p dist
          # redit CLI
          GOOS=darwin GOARCH=arm64 go build -o dist/redit-darwin-arm64 ./cmd/redit
          GOOS=darwin GOARCH=amd64 go build -o dist/redit-darwin-amd64 ./cmd/redit
          GOOS=linux GOARCH=amd64 go build -o dist/redit-linux-amd64 ./cmd/redit
          GOOS=windows GOARCH=amd64 go build -o dist/redit-windows-amd64.exe ./cmd/redit
          # redit-mcp server
          GOOS=darwin GOARCH=arm64 go build -o dist/redit-mcp-darwin-arm64 ./cmd/redit-mcp
          GOOS=darwin GOARCH=amd64 go build -o dist/redit-mcp-darwin-amd64 ./cmd/redit-mcp
          GOOS=linux GOARCH=amd64 go build -o dist/redit-mcp-linux-amd64 ./cmd/redit-mcp
          GOOS=windows GOARCH=amd64 go build -o dist/redit-mcp-windows-amd64.exe ./cmd/redit-mcp

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.version }}" \
            redit/dist/redit-darwin-arm64 \
            redit/dist/redit-darwin-amd64 \
            redit/dist/redit-linux-amd64 \
            redit/dist/redit-windows-amd64.exe \
            redit/dist/redit-mcp-darwin-arm64 \
            redit/dist/redit-mcp-darwin-amd64 \
            redit/dist/redit-mcp-linux-amd64 \
            redit/dist/redit-mcp-windows-amd64.exe
