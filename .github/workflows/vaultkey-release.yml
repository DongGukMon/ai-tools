name: "vaultkey: Release"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: vaultkey/go.sum

      - name: Build binaries
        run: |
          cd vaultkey
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -o dist/vaultkey-darwin-arm64 ./cmd/vaultkey
          GOOS=darwin GOARCH=amd64 go build -o dist/vaultkey-darwin-amd64 ./cmd/vaultkey
          GOOS=linux GOARCH=amd64 go build -o dist/vaultkey-linux-amd64 ./cmd/vaultkey
          GOOS=windows GOARCH=amd64 go build -o dist/vaultkey-windows-amd64.exe ./cmd/vaultkey

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vaultkey/dist/vaultkey-darwin-arm64
            vaultkey/dist/vaultkey-darwin-amd64
            vaultkey/dist/vaultkey-linux-amd64
            vaultkey/dist/vaultkey-windows-amd64.exe
          generate_release_notes: true
