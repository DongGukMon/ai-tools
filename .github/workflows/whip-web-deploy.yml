name: Deploy Whip Web Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'whip/dashboard-web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: whip/dashboard-web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: whip/dashboard-web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: whip/dashboard-web
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=whip-dashboard
          workingDirectory: whip/dashboard-web
