name: Deploy Whip Web Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'whip/dashboard-web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: whip/dashboard-web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: whip/dashboard-web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: whip/dashboard-web
        run: pnpm build

      - name: Load Cloudflare secrets from vaultkey
        uses: ./vaultkey-action
        with:
          gh-pat: ${{ secrets.GH_PAT }}
          vault-repo: ${{ secrets.VAULT_REPO }}
          password: ${{ secrets.VAULTKEY_PASSWORD }}
          secrets: |
            CLOUDFLARE_API_TOKEN=cloudflare CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID=cloudflare CLOUDFLARE_ACCOUNT_ID

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=whip-dashboard
          workingDirectory: whip/dashboard-web
