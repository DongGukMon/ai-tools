name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  redit:
    name: redit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd redit
          go test ./...
