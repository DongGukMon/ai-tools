name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          tag="$RAW_TAG"
          semver_tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if ! printf '%s\n' "$tag" | grep -Eq "$semver_tag_pattern"; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          printf 'RELEASE_TAG=%s\n' "$tag" >> "$GITHUB_ENV"

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="$RELEASE_TAG"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          BODY=""
          PRODUCTS="whip claude-irc redit vaultkey webform rewind grove"
          EXCLUDED_COMMIT_PATTERN='^chore: update plugin versions to '

          for product in $PRODUCTS; do
            if [ -n "$PREV_TAG" ]; then
              COMMITS=$(git log --oneline --invert-grep --grep "$EXCLUDED_COMMIT_PATTERN" "${PREV_TAG}..${TAG}" -- "${product}/")
            else
              COMMITS=$(git log --oneline --invert-grep --grep "$EXCLUDED_COMMIT_PATTERN" "${TAG}" -- "${product}/")
            fi

            BODY="${BODY}## ${product}"$'\n'
            if [ -z "$COMMITS" ]; then
              BODY="${BODY}(no changes)"$'\n'
            else
              while IFS= read -r line; do
                # Strip commit hash prefix
                MSG="${line#* }"
                BODY="${BODY}- ${MSG}"$'\n'
              done <<< "$COMMITS"
            fi
            BODY="${BODY}"$'\n'
          done

          # Write to file to preserve newlines
          echo "$BODY" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file /tmp/release-notes.md

  claude-irc:
    needs: [create-release]
    uses: ./.github/workflows/claude-irc-release.yml
    with:
      version: ${{ github.ref_name }}

  redit:
    needs: [create-release]
    uses: ./.github/workflows/redit-release.yml
    with:
      version: ${{ github.ref_name }}

  vaultkey:
    needs: [create-release]
    uses: ./.github/workflows/vaultkey-release.yml
    with:
      version: ${{ github.ref_name }}

  webform:
    needs: [create-release]
    uses: ./.github/workflows/webform-release.yml
    with:
      version: ${{ github.ref_name }}

  whip:
    needs: [create-release]
    uses: ./.github/workflows/whip-release.yml
    with:
      version: ${{ github.ref_name }}

  rewind:
    needs: [create-release]
    uses: ./.github/workflows/rewind-release.yml
    with:
      version: ${{ github.ref_name }}

  grove:
    needs: [create-release]
    uses: ./.github/workflows/grove-release.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      VAULTKEY_PASSWORD: ${{ secrets.VAULTKEY_PASSWORD }}
      GH_PAT: ${{ secrets.GH_PAT }}

  marketplace:
    needs: [claude-irc, redit, vaultkey, webform, whip, rewind]
    uses: ./.github/workflows/cc-marketplace-release.yml
    with:
      version: ${{ github.ref_name }}
