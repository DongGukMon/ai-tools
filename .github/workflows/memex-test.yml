name: "memex: Test"

on:
  push:
    branches: [main]
    paths:
      - 'memex/**'
  pull_request:
    branches: [main]
    paths:
      - 'memex/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: |
          cd memex
          pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd memex
          pnpm test
