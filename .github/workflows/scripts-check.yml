name: "scripts: Check freshness"

on:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-ensure-binary.sh'
      - 'scripts/lib/**'
      - '**/ensure-binary.conf'
      - '**/ensure-binary.sh'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/generate-ensure-binary.sh'
      - 'scripts/lib/**'
      - '**/ensure-binary.conf'
      - '**/ensure-binary.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check ensure-binary.sh freshness
        run: ./scripts/generate-ensure-binary.sh --check
