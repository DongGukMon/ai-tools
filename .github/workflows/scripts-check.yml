name: "scripts: Check freshness"

on:
  push:
    branches: [main]
    paths:
      - 'scripts/lib/**'
      - '**/ensure-binary.conf'
      - '**/ensure-binary.sh'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/lib/**'
      - '**/ensure-binary.conf'
      - '**/ensure-binary.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ensure-binary.sh freshness
        run: ./scripts/generate-ensure-binary.sh --check
