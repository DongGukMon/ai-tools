name: "vaultkey-action: Test"

on:
  push:
    branches: [main]
    paths:
      - 'vaultkey-action/**'
      - 'vaultkey/**'
  pull_request:
    branches: [main]
    paths:
      - 'vaultkey-action/**'
      - 'vaultkey/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: vaultkey/go.mod
          cache-dependency-path: vaultkey/go.sum

      - name: Seed local vault remote
        env:
          TEST_PASSWORD: test-password
          TEST_SCOPE: app
          TEST_KEY: TEST_SECRET
          TEST_VALUE: smoke-secret-value
        run: |
          set -euo pipefail

          remote_repo="$RUNNER_TEMP/vault-remote.git"
          seed_home="$RUNNER_TEMP/vault-seed-home"
          seed_binary="$RUNNER_TEMP/vaultkey-seed"

          git init --bare "$remote_repo"

          cd vaultkey
          go build -o "$seed_binary" ./cmd/vaultkey
          cd ..

          mkdir -p "$seed_home"
          export HOME="$seed_home"
          export VAULTKEY_PASSWORD="$TEST_PASSWORD"

          "$seed_binary" init --ci "file://$remote_repo"
          git -C "$HOME/.vaultkey/repo" config user.name "github-actions[bot]"
          git -C "$HOME/.vaultkey/repo" config user.email "github-actions[bot]@users.noreply.github.com"
          "$seed_binary" set "$TEST_SCOPE" "$TEST_KEY" "$TEST_VALUE"

      - name: Build local vaultkey binary
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/bin"
          cd vaultkey
          go build -o "$HOME/.local/bin/vaultkey" ./cmd/vaultkey
          cd ..
          chmod 755 "$HOME/.local/bin/vaultkey"

      - name: Run vaultkey action
        uses: ./vaultkey-action
        with:
          vault-url: file://${{ runner.temp }}/vault-remote.git
          password: test-password
          secrets: |
            TEST_SECRET=app TEST_SECRET
          skip-install: true

      - name: Verify loaded secrets
        env:
          EXPECTED_SECRET: smoke-secret-value
        run: |
          set -euo pipefail

          if [ "${TEST_SECRET:-}" != "$EXPECTED_SECRET" ]; then
            echo "TEST_SECRET mismatch" >&2
            exit 1
          fi

          # Verify vault state was cleaned up by the action
          if [ -d "$HOME/.vaultkey/repo" ]; then
            echo "vault repo should have been cleaned up" >&2
            exit 1
          fi
