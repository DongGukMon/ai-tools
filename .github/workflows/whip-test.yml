name: "whip: Test"

on:
  push:
    branches: [main]
    paths:
      - 'whip/**'
  pull_request:
    branches: [main]
    paths:
      - 'whip/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd whip
          go test ./...
