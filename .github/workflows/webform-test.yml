name: "webform: Test"

on:
  push:
    branches: [main]
    paths:
      - 'webform/**'
  pull_request:
    branches: [main]
    paths:
      - 'webform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: webform/go.sum

      - name: Run tests
        run: |
          cd webform
          go test ./...
