name: "claude-irc: Test"

on:
  push:
    branches: [main]
    paths:
      - 'claude-irc/**'
  pull_request:
    branches: [main]
    paths:
      - 'claude-irc/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd claude-irc
          go test ./...
