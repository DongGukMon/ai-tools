name: "claude-irc: Test"

on:
  push:
    branches: [main]
    paths:
      - 'claude-irc/**'
      - 'shared/agentbus/**'
      - 'shared/upgrade/**'
  pull_request:
    branches: [main]
    paths:
      - 'claude-irc/**'
      - 'shared/agentbus/**'
      - 'shared/upgrade/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: claude-irc/go.mod
          cache-dependency-path: claude-irc/go.sum

      - name: Run tests
        run: |
          cd claude-irc
          go test ./...

      - name: Build release binaries
        run: |
          cd claude-irc
          make cross VERSION=test
