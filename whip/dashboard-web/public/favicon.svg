<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Red coiled whip forming a circle -->
  <defs>
    <linearGradient id="whipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E53E3E"/>
      <stop offset="50%" stop-color="#C53030"/>
      <stop offset="100%" stop-color="#9B2C2C"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0AEC0"/>
      <stop offset="50%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    <linearGradient id="whipHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FC8181"/>
      <stop offset="100%" stop-color="#E53E3E"/>
    </linearGradient>
  </defs>

  <!-- Main whip coil (thick red rope in circle) -->
  <circle cx="64" cy="68" r="38" fill="none" stroke="url(#whipGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Highlight on the whip rope (inner edge) -->
  <circle cx="64" cy="68" r="38" fill="none" stroke="url(#whipHighlight)" stroke-width="4" stroke-linecap="round" opacity="0.5" stroke-dasharray="60 180" stroke-dashoffset="30"/>

  <!-- Dark inner shadow -->
  <circle cx="64" cy="68" r="38" fill="none" stroke="#9B2C2C" stroke-width="3" stroke-linecap="round" opacity="0.4" stroke-dasharray="80 160" stroke-dashoffset="140"/>

  <!-- Handle at top -->
  <rect x="56" y="8" width="16" height="28" rx="4" fill="url(#handleGrad)"/>
  <!-- Handle highlight -->
  <rect x="58" y="10" width="5" height="24" rx="2" fill="#A0AEC0" opacity="0.4"/>
  <!-- Handle cap -->
  <rect x="54" y="6" width="20" height="6" rx="3" fill="#4A5568"/>

  <!-- Whip tail at bottom-left -->
  <path d="M34 96 Q24 108 18 114 Q14 118 16 120" fill="none" stroke="url(#whipGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Tail tip -->
  <path d="M16 120 Q14 124 10 126" fill="none" stroke="#C53030" stroke-width="5" stroke-linecap="round"/>
</svg>
